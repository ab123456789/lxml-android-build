
name: Manual lxml Build for Android

on:
  workflow_dispatch:

jobs:
  build:
    name: Build lxml cp313-manylinux_aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lxml source
        uses: actions/checkout@v4
        with:
          repository: 'lxml/lxml'
          ref: 'lxml-6.1.0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev python3.11-dev

      - name: Set up cross-compilation environment
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/aarch64-linux-gnu/lib" >> $GITHUB_ENV

      - name: Build the wheel
        run: |
          python3.11 setup.py bdist_wheel --plat-name manylinux_2_28_aarch64 --python-tag cp313

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lxml-wheel
          path: dist/*.whl
